name: Update README via Cron

on:
  schedule:
    - cron: '5 16 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Path Check
        run: |
          if [ ! -f ".github/scripts/update_readme.py" ]; then
            echo "Error: 파이썬 파일이 올바른 경로에 없습니다."
            exit 1
          fi

      - name: Run Update Script
        run: python .github/scripts/update_readme.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coding_test.md
          
          if [ -z "$(git diff --staged --name-only)" ]; then
            echo "업데이트할 새로운 데이터가 없습니다. (변경점 없음)"
          else
            git commit -m "docs: Update problem solving status"
            git push origin main || { echo "Push 차단됨: 브랜치 보호 규칙이나 권한을 확인하세요."; exit 1; }
          fi
