name: mirror Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   

      - name: Push to SooyeonJ/team_CS-Study
        run: |
          git config user.name "dori-2i"
          git config user.email "actions@github.com"
          git remote add study https://${{ secrets.PAT_TOKEN }}@github.com/SooyeonJ/team_CS-Study.git
          git push study main:dori-2i --force
